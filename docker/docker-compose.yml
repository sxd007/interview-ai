version: "3.9"

services:
  # CPU Version - For macOS, Linux without GPU, or development
  api-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    container_name: interview-ai-cpu
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./data/interview_ai.db
      - UPLOAD_DIR=./data/uploads
      - OUTPUT_DIR=./data/outputs
      - MODEL_CACHE_DIR=./models
      - HF_TOKEN=${HF_TOKEN:-}
    environment_file:
      - ../.env
    restart: unless-stopped

  # GPU Version - For Linux with NVIDIA GPU
  # Usage: docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up
  # Or directly:
  # docker-compose -f docker-compose.yml up api-gpu
  api-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    container_name: interview-ai-gpu
    ports:
      - "8001:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./data/interview_ai.db
      - UPLOAD_DIR=./data/uploads
      - OUTPUT_DIR=./data/outputs
      - MODEL_CACHE_DIR=./models
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0
    environment_file:
      - ../.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu
